name: CI

# Runs the same gate contributors run locally (see CONTRIBUTING.md §4):
# format check, lint, tests (when present) and a production build. A green
# run is required before merging to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a new push to an open PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: format · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Tests
        # No test runner yet — --if-present skips cleanly until one is added.
        run: npm test --if-present

      - name: Production build
        run: npm run build
        env:
          # Placeholder values so the build compiles without real secrets. The
          # data layers degrade gracefully, so no live Neon/Redis/OAuth needed;
          # real secrets live in the Vercel/Render dashboards (see DEPLOYMENT.md).
          DATABASE_URL: postgresql://user:pass@ep-ci.eu-central-1.aws.neon.tech/ci?sslmode=require
          REDIS_URL: ""
          CONSUMET_API_URL: http://localhost:3001
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          NEXTAUTH_SECRET: ci-placeholder-secret-ci-placeholder-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"
